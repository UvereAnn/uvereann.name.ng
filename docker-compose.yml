version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production 
      - PORT=3000
      - ALLOWED_ORIGIN=http://localhost
      - DB_PATH=/app/data/database.db
    volumes:
       - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s # Increased slightly to give the DB time to seed
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network

volumes:
  backend-data:

networks:
  portfolio-network:
    driver: bridge