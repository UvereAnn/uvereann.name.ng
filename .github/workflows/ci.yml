name: CI

on:
  push:
    branches: [main]
  pull_request:
    brances: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        #downloads your repositroy code onto the runner

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/packeage-lock.json
          #cache: speeds up subsequent runs by caching node_modules

      - name: Install dependencies
        run: cd backend && npm ci
        #npm ci is like npm install but:
        # - Uses package-lock.json exactly (reproducible)
        # - Fatser in CI environments
        # - Fails if package-lock.json is out of sync

      - name: Run backend tests
        run: cd backend && npm test

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    # needs: test means this job only runs if test passes

    steps:
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Run Trivy vulnerabiity scanner
       uses: aquasecurity/trivy-action@master
       with:
         scan-type: 'fs'           #scan the filesystem (code + deps) 
         scan-ref: '.'             #scan from root
         severity: 'CRITICAL,HIGH' #only fail on these levels
         exit-code: '1'            #exit 1 = fail the pipeline
         format: 'table'           #output format

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint